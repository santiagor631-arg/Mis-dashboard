<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SaReZ HH — Terminal Fijo</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0f12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translacent">
<meta name="apple-mobile-web-app-title" content="SaReZ HH">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f12;--bg-s:#111418;--bg-c:#181c22;--bg-ch:#1e232b;
  --bdr:#ffffff12;--bdr-md:#ffffff22;
  --acc:#e8c96a;--acc-d:#e8c96a18;--acc-t:#f5dfa0;
  --txt:#e8eaf0;--txt2:#7e8898;--txtm:#4a5568;
  --ok:#4ade80;--err:#f87171;--wrn:#fbbf24;--inf:#60a5fa;
  --tr:0.18s ease;
}
html,body{
  height:100%;background:#060709;
  font-family:'DM Sans',sans-serif;font-size:13px;
  display:flex;align-items:flex-start;justify-content:flex-start;
}

/* Device shell */
#TF_device{
  width:480px;min-width:480px;max-width:480px;
  height:100vh;background:var(--bg);
  display:flex;flex-direction:column;
  border-right:1px solid var(--bdr-md);
  overflow:hidden;position:relative;
}

/* Header */
#TF_header{
  background:var(--bg-s);border-bottom:1px solid var(--bdr);
  padding:10px 14px;display:flex;align-items:center;gap:12px;
  flex-shrink:0;z-index:10;position:relative;
}
#TF_header.hidden{display:none}
#TF_hamburger{
  background:none;border:none;cursor:pointer;
  padding:4px;color:var(--txt2);font-size:22px;line-height:1;
  transition:color var(--tr);
}
#TF_hamburger:hover{color:var(--txt)}
#TF_header_title{
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;letter-spacing:.06em;color:var(--txt);flex:1;
}
#TF_header_user{font-size:11px;color:var(--txtm);text-align:right;line-height:1.4}

/* Screen */
#TF_screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;
  position:relative;
}
#TF_screen::-webkit-scrollbar{width:4px}
#TF_screen::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:2px}

/* Drawer */
#TF_drawer_overlay{
  position:absolute;inset:0;background:#00000070;
  z-index:50;display:none;
}
#TF_drawer_overlay.open{display:flex}
#TF_drawer{
  width:78%;background:var(--bg-s);
  border-right:1px solid var(--bdr-md);
  display:flex;flex-direction:column;overflow-y:auto;
}
.tf-drawer-hdr{
  padding:14px 16px 10px;border-bottom:1px solid var(--bdr);
  margin-bottom:6px;display:flex;align-items:center;gap:10px;
}
.tf-drawer-logo{height:36px;width:auto}
.tf-drawer-name{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.06em;color:var(--acc)}
.tf-drawer-user-row{
  padding:8px 16px 10px;border-bottom:1px solid var(--bdr);margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.tf-drawer-user-av{
  width:32px;height:32px;border-radius:50%;
  background:var(--acc-d);border:1px solid #e8c96a30;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;color:var(--acc-t);flex-shrink:0;
}
.tf-drawer-user-info{}
.tf-drawer-user-name{font-size:13px;font-weight:500;color:var(--txt)}
.tf-drawer-user-role{font-size:10px;color:var(--txtm)}
.tf-drawer-section{
  padding:6px 14px 4px;font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:.09em;color:var(--txtm);
}
.tf-drawer-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  transition:background var(--tr);border-left:2px solid transparent;
}
.tf-drawer-item:hover{background:var(--bg-ch)}
.tf-drawer-item.active{background:#e8c96a0a;border-left-color:var(--acc)}
.tf-drawer-ic{
  width:30px;height:30px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
}
.tf-drawer-lbl{font-size:14px;font-weight:500;color:var(--txt2)}
.tf-drawer-item.active .tf-drawer-lbl{color:var(--acc-t)}
.tf-drawer-sep{height:1px;background:var(--bdr);margin:6px 0}

/* Login screen */
#TF_login{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  height:100%;gap:0;padding:32px 28px;
  background:#000;
}
.tf-login-logo{width:200px;height:auto;margin-bottom:8px}
.tf-login-tagline{
  font-size:10px;color:#ffffff30;letter-spacing:.12em;
  text-transform:uppercase;margin-bottom:44px;
}
.tf-login-form{width:100%;max-width:300px;display:flex;flex-direction:column;gap:12px}
.tf-login-field label{
  display:block;font-size:10px;text-transform:uppercase;
  letter-spacing:.07em;color:#ffffff40;margin-bottom:5px;
}
.tf-login-inp{
  width:100%;background:#ffffff08;border:1px solid #ffffff18;
  border-radius:8px;padding:13px 14px;color:var(--txt);
  font-size:15px;font-family:'DM Sans',sans-serif;outline:none;
  transition:border-color var(--tr);
}
.tf-login-inp:focus{border-color:var(--acc)}
.tf-login-inp::placeholder{color:#ffffff25}
.tf-login-btn{
  background:var(--acc);color:#0d0f12;border:none;
  border-radius:8px;padding:15px;font-size:16px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:background var(--tr);margin-top:6px;
}
.tf-login-btn:hover{background:var(--acc-t)}
.tf-login-err{
  font-size:12px;color:var(--err);text-align:center;
  min-height:16px;margin-top:-4px;
}

/* Home screen (Opcion B) */
.tf-home-body{padding:14px}
.tf-home-greeting{
  padding:4px 2px 14px;
  font-size:13px;color:var(--txtm);
}
.tf-home-greeting strong{color:var(--txt);font-weight:500}
.tf-sec-card{
  background:var(--bg-c);border:1px solid var(--bdr);
  border-radius:10px;padding:16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background var(--tr),border-color var(--tr);
}
.tf-sec-card:hover{background:var(--bg-ch);border-color:var(--bdr-md)}
.tf-sec-ic{
  width:46px;height:46px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:23px;flex-shrink:0;
}
.tf-sec-lbl{font-size:16px;font-weight:500;color:var(--txt);flex:1}
.tf-sec-cnt{font-size:11px;color:var(--txtm);margin-right:4px}
.tf-sec-chev{font-size:16px;color:var(--txtm)}
.ic-rec{background:#60a5fa14;color:#60a5fa}
.ic-des{background:#fbbf2414;color:#fbbf24}
.ic-prep{background:#e8c96a14;color:#e8c96a}
.ic-dep{background:#4ade8014;color:#4ade80}
.ic-dev{background:#f8717114;color:#f87171}

/* Section screen */
.tf-section-body{padding:14px}
.tf-section-hdr{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.tf-section-hdr-ic{
  width:38px;height:38px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.tf-section-hdr-title{
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;letter-spacing:.06em;color:var(--txt);
}
.tf-op-card{
  background:var(--bg-c);border:1px solid var(--bdr);
  border-radius:10px;padding:16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:background var(--tr),border-color var(--tr);
}
.tf-op-card:hover{background:var(--bg-ch);border-color:var(--bdr-md)}
.tf-op-ic{
  width:44px;height:44px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
}
.tf-op-info{flex:1}
.tf-op-lbl{font-size:15px;font-weight:500;color:var(--txt);margin-bottom:2px}
.tf-op-sub{font-size:11px;color:var(--txtm)}
.tf-op-chev{font-size:16px;color:var(--txtm)}

/* Footer */
#TF_footer{
  background:var(--bg-s);border-top:1px solid var(--bdr);
  padding:8px 0 12px;display:flex;
  justify-content:space-around;flex-shrink:0;
}
#TF_footer.hidden{display:none}
.tf-nav-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  cursor:pointer;padding:2px 20px;opacity:.45;
  transition:opacity var(--tr);
}
.tf-nav-btn:hover{opacity:.8}
.tf-nav-btn.act{opacity:1}
.tf-nav-lbl{font-size:9px;color:var(--txtm);text-transform:uppercase;letter-spacing:.06em}
.tf-nav-lbl.acc{color:var(--acc)}

</style>
</head>

function TF_doLogin() {
  var user = (document.getElementById('TF_inp_user').value || '').toLowerCase().trim();
  var pass = document.getElementById('TF_inp_pass').value;
  var err  = document.getElementById('TF_login_err');
  if (!user || !pass) { err.textContent = 'Complet\u00e1 usuario y contrase\u00f1a'; return; }
  if (!TF_USERS[user]) { err.textContent = 'Usuario no encontrado'; return; }
  // Hardcoded: any password works for now
  TF_user = TF_USERS[user];
  TF_user.username = user;
  TF_renderHome();
}

// ── HOME ──
function TF_renderHome() {
  document.getElementById('TF_header').classList.remove('hidden');
  document.getElementById('TF_footer').classList.remove('hidden');
  document.getElementById('TF_header_title').textContent = 'SaReZ HH';
  document.getElementById('TF_header_user').innerHTML =
    TF_user.initials + '<br><span style="color:var(--acc)">\u25cf</span>';

  // Drawer user row
  var row = document.getElementById('TF_drawer_user_row');
  row.innerHTML = '<div class="tf-drawer-user-av">'+TF_user.initials+'</div>'
    + '<div class="tf-drawer-user-info">'
      + '<div class="tf-drawer-user-name">'+TF_user.name+'</div>'
      + '<div class="tf-drawer-user-role">'+TF_user.role+'</div>'
    + '</div>';

  var screen = document.getElementById('TF_screen');
  screen.style.background = '';
  screen.innerHTML = '';
  TF_history = [];
  TF_currentSection = null;
  TF_updateDrawerActive(null);
  TF_setNavHome(true);

  var body = document.createElement('div');
  body.className = 'tf-home-body';

  // Greeting
  var greet = document.createElement('div');
  greet.className = 'tf-home-greeting';
  var hora = new Date().getHours();
  var saludo = hora < 12 ? 'Buenos d\u00edas' : hora < 18 ? 'Buenas tardes' : 'Buenas noches';
  greet.innerHTML = saludo + ', <strong>' + TF_user.name.split(' ')[0] + '</strong>';
  body.appendChild(greet);

  // Section cards
  Object.keys(TF_SECTIONS).forEach(function(key){
    var sec = TF_SECTIONS[key];
    var card = document.createElement('div');
    card.className = 'tf-sec-card';
    card.innerHTML =
      '<div class="tf-sec-ic '+sec.color+'"><i class="ti '+sec.icon+'" aria-hidden="true"></i></div>'
      + '<div class="tf-sec-lbl">'+sec.label+'</div>'
      + '<div class="tf-sec-cnt">'+sec.ops.length+' ops</div>'
      + '<div class="tf-sec-chev"><i class="ti ti-chevron-right" aria-hidden="true"></i></div>';
    card.addEventListener('click', function(){ TF_goSection(key); });
    body.appendChild(card);
  });
  screen.appendChild(body);
}

// ── SECTION ──
function TF_renderSection(sectionKey) {
  var sec = TF_SECTIONS[sectionKey];
  if (!sec) return;
  var screen = document.getElementById('TF_screen');
  screen.innerHTML = '';
  document.getElementById('TF_header_title').textContent = sec.label;
  TF_currentSection = sectionKey;
  TF_updateDrawerActive(sectionKey);
  TF_setNavHome(false);

  var body = document.createElement('div');
  body.className = 'tf-section-body';

  var hdr = document.createElement('div');
  hdr.className = 'tf-section-hdr';
  hdr.innerHTML = '<div class="tf-section-hdr-ic '+sec.color+'"><i class="ti '+sec.icon+'" aria-hidden="true"></i></div>'
    + '<div class="tf-section-hdr-title">'+sec.label+'</div>';
  body.appendChild(hdr);

  sec.ops.forEach(function(op){
    var card = document.createElement('div');
    card.className = 'tf-op-card';
    card.innerHTML =
      '<div class="tf-op-ic '+sec.color+'"><i class="ti '+op.icon+'" aria-hidden="true"></i></div>'
      + '<div class="tf-op-info">'
        + '<div class="tf-op-lbl">'+op.label+'</div>'
        + '<div class="tf-op-sub">'+op.sub+'</div>'
      + '</div>'
      + '<div class="tf-op-chev"><i class="ti ti-chevron-right" aria-hidden="true"></i></div>';
    body.appendChild(card);
  });
  screen.appendChild(body);
}

// ── NAV ──
function TF_goHome() {
  TF_history = [];
  document.getElementById('TF_header_title').textContent = 'SaReZ HH';
  TF_renderHome();
}

function TF_goSection(key) {
  TF_closeDrawer();
  if (TF_currentSection) TF_history.push(TF_currentSection);
  else TF_history.push('home');
  TF_renderSection(key);
}

function TF_navBack() {
  if (TF_history.length === 0) { TF_goHome(); return; }
  var prev = TF_history.pop();
  if (prev === 'home' || !prev) { TF_goHome(); }
  else { TF_renderSection(prev); }
}

function TF_setNavHome(isHome) {
  document.getElementById('TF_nav_back').classList.toggle('act', !isHome);
  document.getElementById('TF_nav_home').classList.toggle('act', isHome);
}

function TF_updateDrawerActive(key) {
  document.querySelectorAll('.tf-drawer-item[data-section]').forEach(function(el){
    el.classList.toggle('active', el.dataset.section === key);
  });
}

function TF_toggleDrawer() {
  document.getElementById('TF_drawer_overlay').classList.toggle('open');
}

function TF_closeDrawer() {
  document.getElementById('TF_drawer_overlay').classList.remove('open');
}

function TF_logout() {
  TF_closeDrawer();
  TF_user = null;
  TF_renderLogin();
}

// Init
TF_renderLogin();

// Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js');
  });
}

</script>
